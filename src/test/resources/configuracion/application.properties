# ===================================================================
# CONFIGURACIÓN DE LA APLICACIÓN DE PRUEBAS BDD
# ===================================================================
# Archivo de configuración principal para las pruebas automatizadas
# Modifica estos valores según tu entorno de pruebas

# ===================================================================
# CONFIGURACIÓN DEL NAVEGADOR
# ===================================================================
# Tipo de navegador a utilizar (chrome, firefox, edge)
navegador.tipo=chrome

# Ejecutar en modo headless (true/false)
# true = sin interfaz gráfica, false = con interfaz visible
navegador.headless=false

# Timeout implícito en segundos para encontrar elementos
navegador.timeout.implicito=10

# Timeout explícito en segundos para esperas específicas
navegador.timeout.explicito=15

# Timeout de carga de página en segundos
navegador.timeout.pagina=30

# Resolución de pantalla del navegador (ancho x alto)
navegador.resolucion.ancho=1920
navegador.resolucion.alto=1080

# Descargar archivos automáticamente (true/false)
navegador.descarga.automatica=false

# Directorio de descargas (relativo al proyecto)
navegador.directorio.descarga=descargas

# ===================================================================
# URLS DE LA APLICACIÓN
# ===================================================================
# URL base de la aplicación bajo prueba
aplicacion.url.base=http://localhost:8080

# URL específica para login
aplicacion.url.login=${aplicacion.url.base}/login

# URL específica para registro
aplicacion.url.registro=${aplicacion.url.base}/registro

# URL específica para dashboard
aplicacion.url.dashboard=${aplicacion.url.base}/dashboard

# URL específica para gestión de productos
aplicacion.url.productos=${aplicacion.url.base}/productos

# URL específica para gestión de usuarios
aplicacion.url.usuarios=${aplicacion.url.base}/usuarios

# URL específica para reportes
aplicacion.url.reportes=${aplicacion.url.base}/reportes

# URL específica para configuración
aplicacion.url.configuracion=${aplicacion.url.base}/configuracion

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ===================================================================
# URL de conexión a la base de datos (H2 en memoria para pruebas)
bd.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Usuario de la base de datos
bd.usuario=sa

# Contraseńa de la base de datos
bd.password=

# Driver de la base de datos
bd.driver=org.h2.Driver

# Pool de conexiones - tamańo mínimo
bd.pool.minimo=2

# Pool de conexiones - tamańo máximo
bd.pool.maximo=10

# Pool de conexiones - timeout en segundos
bd.pool.timeout=30

# Habilitar logging SQL (true/false)
bd.logging.sql=false

# ===================================================================
# CONFIGURACIÓN DE REPORTES
# ===================================================================
# Directorio base para reportes (relativo al proyecto)
reportes.directorio=reportes

# Formatos de reporte a generar (html,json,xml)
reportes.formato=html,json,xml

# Incluir screenshots en reportes (true/false)
reportes.incluir.screenshots=true

# Incluir logs detallados en reportes (true/false)
reportes.incluir.logs=true

# Incluir información de trazabilidad (true/false)
reportes.incluir.trazabilidad=true

# Comprimir reportes antiguos (true/false)
reportes.comprimir.antiguos=true

# Días para mantener reportes (0 = mantener todos)
reportes.dias.retencion=30

# Generar reportes de performance (true/false)
reportes.performance=true

# ===================================================================
# CONFIGURACIÓN DE DATOS DE PRUEBA
# ===================================================================
# Archivo de usuarios de prueba (JSON)
datos.usuarios.archivo=datos/usuarios-prueba.json

# Archivo de productos de prueba (JSON)
datos.productos.archivo=datos/productos-prueba.json

# Cargar datos automáticamente al inicio (true/false)
datos.cargar.automatico=true

# Limpiar datos después de cada test (true/false)
datos.limpiar.automatico=true

# Prefijo para datos de prueba (para identificación)
datos.prefijo.prueba=TEST_

# ===================================================================
# CONFIGURACIÓN DE LOGGING
# ===================================================================
# Nivel de logging (TRACE, DEBUG, INFO, WARN, ERROR)
logging.nivel=INFO

# Nivel de logging para Selenium
logging.selenium.nivel=WARN

# Nivel de logging para Cucumber
logging.cucumber.nivel=INFO

# Archivo de log (relativo al proyecto)
logging.archivo=logs/pruebas.log

# Tamańo máximo del archivo de log en MB
logging.archivo.tamano.maximo=10

# Número máximo de archivos de log a mantener
logging.archivos.maximo=5

# Incluir timestamp en logs (true/false)
logging.incluir.timestamp=true

# ===================================================================
# CONFIGURACIÓN DE PERFORMANCE
# ===================================================================
# Habilitar medición de performance (true/false)
performance.habilitar=true

# Umbral de tiempo de respuesta en ms (para alertas)
performance.umbral.respuesta=2000

# Umbral de tiempo de carga de página en ms
performance.umbral.carga.pagina=5000

# Generar reportes de performance (true/false)
performance.generar.reportes=true

# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD
# ===================================================================
# Habilitar validaciones de seguridad (true/false)
seguridad.habilitar.validaciones=true

# Validar certificados SSL (true/false)
seguridad.validar.ssl=false

# Timeout para validaciones de seguridad en segundos
seguridad.timeout=10

# ===================================================================
# CONFIGURACIÓN DE INTEGRACIÓN CONTINUA
# ===================================================================
# Ejecutar en modo CI/CD (true/false)
ci.modo=false

# Formato de reporte para CI (junit, testng)
ci.formato.reporte=junit

# Fallar el build en errores de prueba (true/false)
ci.fallar.en.errores=true

# Publicar reportes automáticamente (true/false)
ci.publicar.reportes=false

# ===================================================================
# CONFIGURACIÓN DE ENVIRONMENT
# ===================================================================
# Ambiente de ejecución (local, desarrollo, testing, staging, produccion)
ambiente=local

# Configuración específica por ambiente
ambiente.local.debug=true
ambiente.desarrollo.url=${aplicacion.url.base}
ambiente.testing.url=http://testing.miapp.com
ambiente.staging.url=http://staging.miapp.com
ambiente.produccion.url=http://produccion.miapp.com

# ===================================================================
# CONFIGURACIÓN DE RETRY Y TOLERANCIA A FALLOS
# ===================================================================
# Número máximo de reintentos para elementos no encontrados
retry.max.intentos=3

# Delay entre reintentos en milisegundos
retry.delay=1000

# Habilitar retry automático (true/false)
retry.automatico=true

# ===================================================================
# CONFIGURACIÓN DE PARALLELIZACIÓN
# ===================================================================
# Número de hilos para ejecución en paralelo
paralelo.hilos=1

# Habilitar ejecución en paralelo (true/false)
paralelo.habilitar=false

# Estrategia de paralelización (feature, scenario, example)
paralelo.estrategia=scenario

# ===================================================================
# CONFIGURACIÓN DE NOTIFICACIONES
# ===================================================================
# Habilitar notificaciones (true/false)
notificaciones.habilitar=false

# Email para notificaciones
notificaciones.email=

# Notificar solo en fallos (true/false)
notificaciones.solo.fallos=true

# ===================================================================
# CONFIGURACIÓN AVANZADA
# ===================================================================
# Habilitar cache de elementos (true/false)
cache.elementos.habilitar=true

# Tiempo de vida del cache en segundos
cache.elementos.ttl=300

# Habilitar captura de video (true/false)
video.captura.habilitar=false

# Calidad de video (low, medium, high)
video.calidad=medium

# ===================================================================
# CONFIGURACIÓN DE TAGS
# ===================================================================
# Tags por defecto a ejecutar (separados por coma)
tags.por.defecto=@SmokeTest

# Tags a excluir por defecto
tags.excluir=@WIP,@Ignore,@Blocked

# Ejecutar solo tags específicos en CI
tags.ci.solo=@SmokeTest,@Regression

# ===================================================================
# CONFIGURACIÓN DE TIMEOUTS ESPECÍFICOS
# ===================================================================
# Timeout para login en segundos
timeout.login=10

# Timeout para carga de dashboard en segundos
timeout.dashboard=15

# Timeout para operaciones CRUD en segundos
timeout.crud=20

# Timeout para reportes en segundos
timeout.reportes=30

# ===================================================================
# CONFIGURACIÓN DE VALIDACIONES
# ===================================================================
# Validar URLs antes de navegar (true/false)
validacion.urls=true

# Validar elementos antes de interactuar (true/false)
validacion.elementos=true

# Validar datos antes de insertar en BD (true/false)
validacion.datos=true

# ===================================================================
# CONFIGURACIÓN DE DESARROLLO
# ===================================================================
# Modo debug habilitado (true/false)
debug.modo=false

# Pausar en fallos para debug (true/false)
debug.pausar.fallos=false

# Mostrar información adicional en consola (true/false)
debug.info.adicional=false

# Tiempo de pausa en debug en segundos
debug.tiempo.pausa=5

# ===================================================================
# CONFIGURACIÓN DE TERCEROS
# ===================================================================
# API Key para servicios externos (si se requiere)
api.key.externa=

# URL de API externa para validaciones
api.url.externa=

# Timeout para APIs externas en segundos
api.timeout.externa=10
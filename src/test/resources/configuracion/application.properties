# =============================================================================
# ARCHIVO DE CONFIGURACIÓN PARA AUTOMATIZACIÓN DE PRUEBAS BDD
# Proyecto: Escenarios de Comportamiento - Curso de Automatización de Pruebas
# Autor: Antonio B. Arriagada LL., Dante Escalona Bustos, Roberto Rivas Lopez
# =============================================================================

# ==================== CONFIGURACIÓN DEL NAVEGADOR ====================

# Tipo de navegador a utilizar (chrome, firefox, edge, safari)
navegador.tipo=chrome

# Modo headless (true para ejecutar sin interfaz gráfica, false para ver el navegador)
navegador.headless=false

# Tamańo de ventana del navegador
navegador.ventana.ancho=1920
navegador.ventana.alto=1080

# Maximizar ventana al iniciar
navegador.maximizar=true

# Timeouts en segundos
navegador.timeout.implicito=10
navegador.timeout.explicito=15
navegador.timeout.carga.pagina=30

# Configuraciones específicas de Chrome
navegador.chrome.opciones.adicionales=--disable-blink-features=AutomationControlled,--disable-extensions,--no-sandbox,--disable-dev-shm-usage

# Configuraciones específicas de Firefox
navegador.firefox.opciones.adicionales=--width=1920,--height=1080

# ==================== URLs DE LA APLICACIÓN ====================

# URL base de la aplicación web bajo pruebas
aplicacion.url.base=http://localhost:8080

# URLs específicas de funcionalidades
aplicacion.url.login=${aplicacion.url.base}/login
aplicacion.url.registro=${aplicacion.url.base}/register
aplicacion.url.dashboard=${aplicacion.url.base}/dashboard
aplicacion.url.productos=${aplicacion.url.base}/products
aplicacion.url.perfil=${aplicacion.url.base}/profile
aplicacion.url.admin=${aplicacion.url.base}/admin

# URLs de API (si se necesita testing de API)
api.url.base=${aplicacion.url.base}/api/v1
api.url.auth=${api.url.base}/auth
api.url.productos=${api.url.base}/productos
api.url.usuarios=${api.url.base}/usuarios

# ==================== CONFIGURACIÓN DE BASE DE DATOS ====================

# Base de datos para pruebas (H2 en memoria por defecto)
bd.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
bd.usuario=sa
bd.password=
bd.driver=org.h2.Driver

# Configuración para SQL Server (comentado por defecto)
#bd.url=jdbc:sqlserver://localhost:1433;databaseName=TestDB
#bd.usuario=testuser
#bd.password=testpass
#bd.driver=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Configuración para MySQL (comentado por defecto)
#bd.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&serverTimezone=UTC
#bd.usuario=testuser
#bd.password=testpass
#bd.driver=com.mysql.cj.jdbc.Driver

# ==================== CONFIGURACIÓN DE REPORTES ====================

# Directorio donde se generarán los reportes
reportes.directorio=reportes

# Formatos de reporte a generar (html,json,junit,timeline)
reportes.formato=html,json,junit,timeline

# Incluir screenshots en los reportes
reportes.incluir.screenshots=true

# Incluir logs detallados en reportes
reportes.incluir.logs=true

# Directorio específico para screenshots
reportes.screenshots.directorio=${reportes.directorio}/screenshots

# Configuración de trazabilidad
reportes.trazabilidad.habilitada=true
reportes.trazabilidad.directorio=${reportes.directorio}/trazabilidad

# Generar reportes en tiempo real
reportes.tiempo.real=false

# ==================== CONFIGURACIÓN DE LOGGING ====================

# Nivel de logging (TRACE, DEBUG, INFO, WARN, ERROR)
logging.nivel=INFO

# Nivel para paquetes específicos
logging.nivel.selenium=INFO
logging.nivel.cucumber=INFO
logging.nivel.qa.automatizacion=DEBUG

# Archivo de logs
logging.archivo=${reportes.directorio}/logs/automatizacion.log

# Tamańo máximo del archivo de log antes de rotar
logging.archivo.tamańo.maximo=10MB

# ==================== CONFIGURACIÓN DE DATOS DE PRUEBA ====================

# Archivos de datos de prueba
datos.usuarios.archivo=datos/usuarios-prueba.json
datos.productos.archivo=datos/productos-prueba.json

# Configuración de generación de datos aleatorios
datos.aleatorios.semilla=12345
datos.aleatorios.habilitado=true

# Prefijos para datos de prueba
datos.prefijo.usuario=TEST_USER_
datos.prefijo.producto=TEST_PROD_
datos.prefijo.email=test.automation+

# ==================== CONFIGURACIÓN DE AMBIENTE ====================

# Ambiente de ejecución (desarrollo, testing, staging, produccion)
ambiente.actual=desarrollo

# Configuración específica por ambiente
ambiente.desarrollo.reintentos.maximo=3
ambiente.desarrollo.pausa.entre.reintentos=1000

ambiente.testing.reintentos.maximo=2
ambiente.testing.pausa.entre.reintentos=500

ambiente.staging.reintentos.maximo=1
ambiente.staging.pausa.entre.reintentos=0

# ==================== CONFIGURACIÓN DE PARALELIZACIÓN ====================

# Habilitar ejecución en paralelo
paralelizacion.habilitada=false

# Número de hilos paralelos
paralelizacion.numero.hilos=4

# Estrategia de paralelización (scenarios, features, classes)
paralelizacion.estrategia=scenarios

# ==================== CONFIGURACIÓN DE INTEGRACIÓN CONTINUA ====================

# Configuración para Jenkins
ci.jenkins.build.number=${BUILD_NUMBER:Local}
ci.jenkins.job.name=${JOB_NAME:Local Development}

# Configuración para GitHub Actions
ci.github.run.id=${GITHUB_RUN_ID:Local}
ci.github.ref=${GITHUB_REF:refs/heads/main}

# Configuración para GitLab CI
ci.gitlab.pipeline.id=${CI_PIPELINE_ID:Local}
ci.gitlab.commit.sha=${CI_COMMIT_SHA:Local}

# ==================== CONFIGURACIÓN DE NOTIFICACIONES ====================

# Habilitar notificaciones
notificaciones.habilitadas=false

# Configuración de email (para notificaciones de fallos)
notificaciones.email.servidor.smtp=smtp.gmail.com
notificaciones.email.puerto=587
notificaciones.email.usuario=automation@test.com
notificaciones.email.password=
notificaciones.email.destinatarios=anarriag@gmail.com,Jacobo.bustos.22@gmail.com,umancl@gmail.com

# Configuración de Slack (para notificaciones)
notificaciones.slack.webhook.url=
notificaciones.slack.canal=#automatizacion-pruebas

# ==================== CONFIGURACIÓN DE SEGURIDAD ====================

# Configuración para manejo seguro de credenciales
seguridad.encriptar.credenciales=true
seguridad.algoritmo.encriptacion=AES
seguridad.clave.encriptacion=

# Tiempo de expiración de tokens (en minutos)
seguridad.token.expiracion=30

# Configuración de SSL para entornos HTTPS
seguridad.ssl.verificar.certificados=true
seguridad.ssl.protocolo=TLSv1.2

# ==================== CONFIGURACIÓN DE PERFORMANCE ====================

# Configuración de timeouts extendidos para pruebas de performance
performance.timeout.carga.inicial=60
performance.timeout.operacion.lenta=45

# Métricas de performance habilitadas
performance.metricas.habilitadas=true
performance.metricas.umbral.carga.pagina=5000
performance.metricas.umbral.respuesta.api=2000

# ==================== CONFIGURACIÓN DE ACCESIBILIDAD ====================

# Habilitar pruebas de accesibilidad
accesibilidad.pruebas.habilitadas=false
accesibilidad.estandar.wcag=AA
accesibilidad.herramienta=axe-core

# ==================== CONFIGURACIÓN DE MOBILE/RESPONSIVE ====================

# Configuración para pruebas responsive
responsive.pruebas.habilitadas=false
responsive.dispositivos=mobile,tablet,desktop

# Configuración de viewports
responsive.mobile.ancho=375
responsive.mobile.alto=667
responsive.tablet.ancho=768
responsive.tablet.alto=1024
responsive.desktop.ancho=1920
responsive.desktop.alto=1080

# ==================== CONFIGURACIÓN DE RETRY Y ESTABILIDAD ====================

# Configuración global de reintentos
reintentos.habilitados=true
reintentos.maximo.global=3
reintentos.pausa.entre.reintentos=1000

# Configuración específica por tipo de fallo
reintentos.timeout.maximo=2
reintentos.elemento.no.encontrado.maximo=3
reintentos.conexion.maximo=5

# ==================== CONFIGURACIÓN DE LIMPIEZA DE DATOS ====================

# Configuración de limpieza automática
limpieza.datos.automatica=true
limpieza.datos.al.inicio=true
limpieza.datos.al.final=true

# Scripts de limpieza
limpieza.script.inicial=cleanup/init-cleanup.sql
limpieza.script.final=cleanup/final-cleanup.sql

# ==================== CONFIGURACIÓN DE HISTORIAS DE USUARIO ====================

# Configuración de trazabilidad con HU
hu.prefijo.tag=HU-
hu.validar.existencia=true
hu.generar.reporte.cobertura=true

# Archivo de definición de historias de usuario
hu.archivo.definiciones=documentacion/historias-usuario/historias-definidas.json

# ==================== CONFIGURACIÓN DE TAGS ESPECIALES ====================

# Tags que siempre se ejecutan (smoke tests)
tags.siempre.ejecutar=@SmokeTest

# Tags que se ignoran por defecto
tags.ignorar.por.defecto=@WIP,@Ignore,@Broken

# Tags para diferentes ambientes
tags.desarrollo=@Dev
tags.testing=@Test  
tags.staging=@Stage
tags.produccion=@Prod

# ==================== CONFIGURACIÓN AVANZADA ====================

# Configuración de esperas personalizadas
esperas.personalizadas.habilitadas=true
esperas.polling.intervalo=500
esperas.elementos.invisibles.timeout=5

# Configuración de capturas de pantalla
screenshots.formato=PNG
screenshots.calidad=HIGH
screenshots.en.pasos=false
screenshots.solo.en.fallos=true

# Configuración de video recording (si está disponible)
video.recording.habilitado=false
video.recording.directorio=${reportes.directorio}/videos
video.recording.formato=MP4

# ==================== CONFIGURACIÓN DE API TESTING ====================

# Configuración para pruebas de API REST
api.testing.habilitado=false
api.timeout.conexion=5000
api.timeout.lectura=10000
api.validar.ssl=false

# Headers comunes para API
api.headers.content.type=application/json
api.headers.accept=application/json
api.headers.user.agent=AutomationBDD/1.0

# ==================== CONFIGURACIÓN DE INFORMACIÓN DEL PROYECTO ====================

# Información del proyecto para reportes
proyecto.nombre=Proyecto BDD Automatización
proyecto.version=1.0.0
proyecto.descripcion=Automatización de pruebas BDD para aplicación web
proyecto.equipo=Antonio B. Arriagada LL., Dante Escalona Bustos, Roberto Rivas Lopez

# Información del curso
proyecto.curso=Automatización de Pruebas
proyecto.modulo=5 - Escenarios de Comportamiento (BDD)
proyecto.institucion=Institución Educativa

# ==================== CONFIGURACIÓN DE HERRAMIENTAS EXTERNAS ====================

# Configuración para SonarQube (análisis de código)
sonarqube.habilitado=false
sonarqube.url=http://localhost:9000
sonarqube.token=

# Configuración para Jira (integración con issues)
jira.habilitado=false
jira.url=https://company.atlassian.net
jira.usuario=
jira.token=

# Configuración para TestRail (gestión de casos de prueba)
testrail.habilitado=false
testrail.url=https://company.testrail.io
testrail.usuario=
testrail.password=

# ==================== VARIABLES DE DESARROLLO ====================

# Variables útiles durante el desarrollo
desarrollo.debug.habilitado=true
desarrollo.pausa.despues.paso=0
desarrollo.mostrar.localizadores=false
desarrollo.log.detallado.selenium=false

# Configuración para desarrollo local
desarrollo.auto.abrir.reportes=true
desarrollo.mantener.navegador.abierto=false

# ==================== CONFIGURACIÓN FINAL ====================

# Versión de configuración (para tracking de cambios)
config.version=1.0.0
config.fecha.actualizacion=2024-12-15


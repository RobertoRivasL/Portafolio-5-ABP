# =============================================================================
# CONFIGURACIÓN UNIFICADA DEL PROYECTO BDD
# =============================================================================
# Este archivo centraliza toda la configuración del proyecto de automatización
# Seguir el patrón: categoria.subcategoria.propiedad=valor
# =============================================================================

# =============================================================================
# CONFIGURACIÓN DE LA APLICACIÓN BAJO PRUEBA
# =============================================================================

# URLs base del sistema
aplicacion.url.base=http://localhost:8080
aplicacion.url.login=${aplicacion.url.base}/login
aplicacion.url.registro=${aplicacion.url.base}/registro
aplicacion.url.dashboard=${aplicacion.url.base}/dashboard
aplicacion.url.productos=${aplicacion.url.base}/productos
aplicacion.url.usuarios=${aplicacion.url.base}/usuarios
aplicacion.url.reportes=${aplicacion.url.base}/reportes

# Información de la aplicación
aplicacion.nombre=Sistema de Gestión
aplicacion.version=1.0.0
aplicacion.entorno=desarrollo

# =============================================================================
# CONFIGURACIÓN DEL NAVEGADOR
# =============================================================================

# Tipo de navegador: chrome, firefox, edge, safari
navegador.tipo=chrome

# Modo de ejecución
navegador.headless=false
navegador.maximizar=true
navegador.incognito=false

# Timeouts en segundos
navegador.timeout.implicito=10
navegador.timeout.explicito=15
navegador.timeout.carga.pagina=30
navegador.timeout.script=30

# Resolución de pantalla
navegador.resolucion.ancho=1920
navegador.resolucion.alto=1080

# Configuración avanzada
navegador.javascript.habilitado=true
navegador.imagenes.habilitadas=true
navegador.css.habilitado=true

# Emulación móvil (cuando se requiera)
navegador.movil.dispositivo=iPhone 12
navegador.movil.user.agent=Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X)

# =============================================================================
# CONFIGURACIÓN DE REPORTES Y EVIDENCIAS
# =============================================================================

# Directorio de reportes
reportes.directorio=reportes
reportes.formato=html,json,junit
reportes.incluir.screenshots=true
reportes.incluir.logs=true

# Configuración de screenshots
screenshots.directorio=${reportes.directorio}/screenshots
screenshots.calidad=alta
screenshots.formato=png
screenshots.capturar.en.error=true
screenshots.capturar.en.exito=false

# Configuración de logs
logs.directorio=${reportes.directorio}/logs
logs.nivel=INFO
logs.archivo=cucumber.log
logs.tamańo.maximo=10MB
logs.archivos.respaldo=5

# =============================================================================
# CONFIGURACIÓN DE TRAZABILIDAD
# =============================================================================

# Trazabilidad con historias de usuario
trazabilidad.habilitada=true
trazabilidad.archivo=trazabilidad-reporte.json
trazabilidad.incluir.timestamps=true
trazabilidad.incluir.screenshots=true

# Formato de historias de usuario
trazabilidad.patron.historia=HU-\\d+
trazabilidad.prefijo.historia=HU-

# =============================================================================
# CONFIGURACIÓN DE DATOS DE PRUEBA
# =============================================================================

# Usuarios de prueba
datos.usuario.valido.email=test@test.com
datos.usuario.valido.password=password123
datos.usuario.valido.nombre=Usuario de Prueba

datos.usuario.admin.email=admin@test.com
datos.usuario.admin.password=admin123
datos.usuario.admin.nombre=Administrador

datos.usuario.invalido.email=invalid@invalid.com
datos.usuario.invalido.password=wrongpassword

# Productos de prueba
datos.producto.ejemplo.nombre=Producto de Prueba
datos.producto.ejemplo.descripcion=Descripción del producto de prueba
datos.producto.ejemplo.precio=100.00
datos.producto.ejemplo.categoria=Electrónicos

# =============================================================================
# CONFIGURACIÓN DE BASE DE DATOS (si se requiere)
# =============================================================================

# Configuración de BD para pruebas
bd.url=jdbc:h2:mem:testdb
bd.driver=org.h2.Driver
bd.usuario=sa
bd.password=
bd.esquema=public

# Pool de conexiones
bd.pool.tamańo.minimo=1
bd.pool.tamańo.maximo=5
bd.pool.timeout=30

# =============================================================================
# CONFIGURACIÓN DE CUCUMBER
# =============================================================================

# Configuración de ejecución
cucumber.features.directorio=src/test/resources/features
cucumber.glue.paquetes=com.qa.automatizacion.pasos,com.qa.automatizacion.hooks
cucumber.plugin=pretty,html:${reportes.directorio}/html,json:${reportes.directorio}/json/cucumber-report.json

# Tags por defecto
cucumber.filter.tags=not @WIP and not @Ignore

# Configuración adicional
cucumber.publish.enabled=false
cucumber.strict=true
cucumber.dry.run=false

# =============================================================================
# CONFIGURACIÓN DE ENTORNO
# =============================================================================

# Variables de entorno
entorno.nombre=desarrollo
entorno.region=local
entorno.debug=true

# Configuración de red
red.proxy.habilitado=false
red.proxy.host=
red.proxy.puerto=
red.timeout.conexion=30

# =============================================================================
# CONFIGURACIÓN DE SEGURIDAD
# =============================================================================

# Configuración de certificados SSL
ssl.verificar.certificados=false
ssl.aceptar.certificados.invalidos=true

# Configuración de autenticación
auth.token.expiracion=3600
auth.intentos.maximos=3
auth.bloqueo.tiempo=300

# =============================================================================
# CONFIGURACIÓN DE PERFORMANCE
# =============================================================================

# Configuración de rendimiento
performance.timeout.request=5000
performance.timeout.response=10000
performance.reintentos.maximos=3
performance.pausa.entre.reintentos=1000

# Métricas de performance
performance.tiempo.carga.maximo=5
performance.tiempo.respuesta.maximo=3

# =============================================================================
# CONFIGURACIÓN DE PARALELIZACIÓN
# =============================================================================

# Ejecución en paralelo
paralelo.habilitado=false
paralelo.hilos=2
paralelo.estrategia=scenario

# =============================================================================
# CONFIGURACIÓN DE INTEGRACIÓN CONTINUA
# =============================================================================

# Variables para CI/CD
ci.build.numero=${BUILD_NUMBER:0}
ci.branch=${GIT_BRANCH:development}
ci.commit=${GIT_COMMIT:unknown}

# Configuración específica para CI
ci.headless.forzado=true
ci.timeout.global=600
ci.reintentos.escenarios.fallidos=2

# =============================================================================
# CONFIGURACIÓN DE NOTIFICACIONES
# =============================================================================

# Notificaciones por email
notificaciones.email.habilitadas=false
notificaciones.email.destinatarios=qa-team@company.com
notificaciones.email.servidor.smtp=smtp.company.com

# Notificaciones Slack
notificaciones.slack.habilitadas=false
notificaciones.slack.webhook.url=
notificaciones.slack.canal=#qa-automation

# =============================================================================
# CONFIGURACIÓN ESPECÍFICA POR MÓDULO
# =============================================================================

# Configuración para módulo de Login
login.intentos.maximos=3
login.timeout.autenticacion=10
login.recordar.sesion.por.defecto=false

# Configuración para módulo de Registro
registro.validacion.email.habilitada=true
registro.validacion.password.complejidad=media
registro.campos.obligatorios=email,password,nombre

# Configuración para módulo CRUD
crud.paginacion.elementos.por.pagina=10
crud.busqueda.timeout=5
crud.confirmacion.eliminacion=true

# =============================================================================
# CONFIGURACIÓN DE DESARROLLO Y DEBUG
# =============================================================================

# Modo debug
debug.habilitado=false
debug.pausas.manuales=false
debug.logs.detallados=false
debug.screenshots.cada.paso=false

# Configuración de desarrollo
desarrollo.datos.mock=false
desarrollo.cache.habilitado=true
desarrollo.hot.reload=false

# =============================================================================
# CONFIGURACIÓN DE MONITOREO
# =============================================================================

# Métricas de ejecución
metricas.habilitadas=true
metricas.archivo=${reportes.directorio}/metricas.json
metricas.incluir.timestamps=true

# Monitoreo de recursos
monitoreo.memoria.habilitado=false
monitoreo.cpu.habilitado=false
monitoreo.red.habilitado=false

# =============================================================================
# CONFIGURACIÓN PERSONALIZADA
# =============================================================================

# Variables personalizadas del proyecto
proyecto.nombre=Proyecto BDD Automatización
proyecto.version=2.0.0
proyecto.autores=Antonio B. Arriagada LL., Dante Escalona Bustos, Roberto Rivas Lopez
proyecto.curso=Automatización de Pruebas
proyecto.institucion=Institución Educativa

# Configuración específica del curso
curso.modulo=5
curso.tema=Escenarios de Comportamiento (BDD)
curso.objetivo=Implementar pruebas automatizadas con metodología BDD

# =============================================================================
# CONFIGURACIÓN DE HERRAMIENTAS EXTERNAS
# =============================================================================

# Integración con JIRA
jira.habilitado=false
jira.url=
jira.usuario=
jira.token=
jira.proyecto=

# Integración con TestRail
testrail.habilitado=false
testrail.url=
testrail.usuario=
testrail.password=
testrail.proyecto.id=

# =============================================================================
# CONFIGURACIÓN DE VALIDACIÓN
# =============================================================================

# Validaciones automáticas
validacion.url.existencia=true
validacion.elementos.presencia=true
validacion.datos.formato=true
validacion.respuestas.tiempo=true

# Tolerancias de validación
validacion.timeout.elemento=5
validacion.reintentos.busqueda=3
validacion.pausa.entre.validaciones=500
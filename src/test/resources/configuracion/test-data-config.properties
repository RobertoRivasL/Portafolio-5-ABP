<!--
=======================================================================
application-test.properties - Configuración de propiedades para pruebas
=======================================================================
-->

# Configuración de la aplicación web bajo prueba
app.url.base=http://localhost:8080
app.url.login=${app.url.base}/login
app.url.dashboard=${app.url.base}/dashboard
app.url.crud=${app.url.base}/crud

# Configuración de Selenium WebDriver
selenium.browser=chrome
selenium.headless=false
selenium.window.width=1920
selenium.window.height=1080
selenium.implicit.wait=10
selenium.explicit.wait=30
selenium.page.load.timeout=60

# Configuración de usuarios de prueba
test.user.admin.username=admin_test
test.user.admin.password=password123
test.user.admin.email=admin@test.com

test.user.limited.username=user_limited
test.user.limited.password=password123
test.user.limited.email=user@test.com

# Configuración de capturas de pantalla
screenshots.enabled=true
screenshots.path=target/screenshots
screenshots.on.failure=true

# Configuración de reportes
reports.path=target/cucumber-reports
reports.pretty.enabled=true
reports.html.enabled=true
reports.json.enabled=true
reports.junit.enabled=true

# Configuración de base de datos de prueba
test.database.url=jdbc:h2:mem:testdb
test.database.driver=org.h2.Driver
test.database.username=sa
test.database.password=

# Configuración de timeouts
test.timeout.short=5
test.timeout.medium=15
test.timeout.long=60

# Configuración de retry para elementos flaky
test.retry.max.attempts=3
test.retry.delay.seconds=2

# Configuración para pruebas de rendimiento
performance.test.enabled=false
performance.max.response.time.seconds=5
performance.concurrent.users=10

# Configuración de datos de prueba
test.data.generator.enabled=true
test.data.cleanup.enabled=true
test.data.seed=12345
# ===================================================================
# CONFIGURACIÆN DE CUCUMBER
# ===================================================================
# Archivo de configuraciµn especÚfico para Cucumber
# Define cµmo se ejecutan y reportan las pruebas BDD

# ===================================================================
# CONFIGURACIÆN BêSICA DE CUCUMBER
# ===================================================================

# Deshabilitar publicaciµn automÃtica a Cucumber Reports
cucumber.publish.enabled=false

# Silenciar mensaje de publicaciµn
cucumber.publish.quiet=true

# ===================================================================
# CONFIGURACIÆN DE PLUGINS Y REPORTES
# ===================================================================

# Plugins de salida para reportes (separados por coma)
cucumber.plugin=pretty,\
  html:reportes/html/cucumber-report.html,\
  json:reportes/json/cucumber-report.json,\
  junit:reportes/junit/cucumber-report.xml,\
  timeline:reportes/timeline,\
  usage:reportes/usage/cucumber-usage.json

# ===================================================================
# CONFIGURACIÆN DE GLUE (STEP DEFINITIONS)
# ===================================================================

# Paquetes donde estÃn los Step Definitions y Hooks
cucumber.glue=com.qa.automatizacion.pasos,com.qa.automatizacion.hooks

# ===================================================================
# CONFIGURACIÆN DE FEATURES
# ===================================================================

# Ubicaciµn de los archivos .feature
cucumber.features=src/test/resources/features

# ===================================================================
# CONFIGURACIÆN DE FILTROS Y TAGS
# ===================================================================

# Tags que determinan quÕ escenarios ejecutar
# Por defecto: ejecutar todo excepto Work In Progress e Ignorados
cucumber.filter.tags=not @WIP and not @Ignore

# ===================================================================
# CONFIGURACIÆN DE EJECUCIÆN
# ===================================================================

# Ejecutar en modo dry-run (solo verificar sintaxis, no ejecutar)
cucumber.execution.dry-run=false

# Modo estricto: fallar si hay pasos no definidos
cucumber.execution.strict=true

# Mostrar snippets para pasos no implementados
cucumber.execution.wip=false

# ===================================================================
# CONFIGURACIÆN DE NOMBRES Y FORMATO
# ===================================================================

# Estrategia de nombres para JUnit Platform
cucumber.junit-platform.naming-strategy=long

# Incluir descripciµn de escenarios en nombres
cucumber.execution.order=lexical

# ===================================================================
# CONFIGURACIÆN DE OBJETOS Y CONTEXTO
# ===================================================================

# Factory para crear objetos en Step Definitions
cucumber.object-factory=io.cucumber.core.backend.DefaultObjectFactory

# ===================================================================
# CONFIGURACIÆN AVANZADA
# ===================================================================

# Configuraciµn especÚfica para diferentes entornos
cucumber.filter.name=

# Configuraciµn de threads para ejecuciµn paralela
cucumber.execution.parallel.enabled=false
cucumber.execution.parallel.mode.default=same_thread
cucumber.execution.parallel.mode.features=same_thread
cucumber.execution.parallel.mode.scenarios=same_thread

# ===================================================================
# CONFIGURACIÆN DE DESARROLLO
# ===================================================================

# Habilitar logging detallado de Cucumber
cucumber.logging.level=INFO

# Mostrar duraciµn de pasos
cucumber.plugin.stepDuration=true

# ===================================================================
# PERFILES DE CONFIGURACIÆN
# ===================================================================

# Perfil para Smoke Tests
# Para usar: mvn test -Dcucumber.filter.tags="@SmokeTest"
cucumber.profiles.smoke=@SmokeTest

# Perfil para Regression Tests
# Para usar: mvn test -Dcucumber.filter.tags="@Regression"
cucumber.profiles.regression=@Regression

# Perfil para Tests de Login
# Para usar: mvn test -Dcucumber.filter.tags="@Login"
cucumber.profiles.login=@Login

# Perfil para Tests CRUD
# Para usar: mvn test -Dcucumber.filter.tags="@CRUD"
cucumber.profiles.crud=@CRUD

# ===================================================================
# COMENTARIOS Y DOCUMENTACIÆN
# ===================================================================

# Ejemplos de uso de tags:
#
# Ejecutar solo Smoke Tests:
# mvn test -Dcucumber.filter.tags="@SmokeTest"
#
# Ejecutar tests de Login y Registro:
# mvn test -Dcucumber.filter.tags="@Login or @Registro"
#
# Ejecutar Regression pero excluir lentos:
# mvn test -Dcucumber.filter.tags="@Regression and not @Slow"
#
# Ejecutar solo tests positivos:
# mvn test -Dcucumber.filter.tags="@Positivo"
#
# Ejecutar tests de una historia especÚfica:
# mvn test -Dcucumber.filter.tags="@HU-001"

# ===================================================================
# CONFIGURACIÆN PARA INTEGRACIÆN CONTINUA
# ===================================================================

# Configuraciµn especÚfica para CI/CD
# Estas propiedades se pueden sobrescribir en el pipeline

# Para Jenkins:
# cucumber.plugin.ci=junit:target/cucumber-reports/Cucumber.xml

# Para GitLab CI:
# cucumber.plugin.gitlab=json:reports/cucumber-report.json

# Para GitHub Actions:
# cucumber.plugin.github=json:cucumber-report.json

# ===================================================================
# CONFIGURACIÆN DE REPORTES EXTENDIDOS
# ===================================================================

# Incluir informaciµn adicional en reportes JSON
cucumber.plugin.json.expanded=true

# Incluir screenshots en reportes HTML
cucumber.plugin.html.screenshots=true

# Incluir logs en reportes
cucumber.plugin.html.logs=true

# ===================================================================
# CONFIGURACIÆN DE HOOKS
# ===================================================================

# Ejecutar hooks condicionalmente basado en tags
cucumber.hooks.conditional=true

# Orden de ejecuciµn de hooks
cucumber.hooks.order=10000